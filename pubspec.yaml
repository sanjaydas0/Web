name: shoppie
description: >-
  Modern cross-platform shopping user app with Firebase backend.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  firebase_core: ^2.30.0
  firebase_auth: ^4.18.0
  cloud_firestore: ^5.15.1
  firebase_storage: ^12.6.1
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1
  http: ^1.2.1
  dio: ^5.4.3+1
  intl: ^0.19.0
  flutter_local_notifications: ^17.1.2
  go_router: ^14.0.2
  flutter_stripe: ^10.0.0
  lottie: ^3.1.0

  # For PDF invoice generation
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/